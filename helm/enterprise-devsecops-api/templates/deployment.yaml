apiVersion: apps/v1
kind: Deployment

metadata:
  name: {{ include "enterprise-devsecops-api.fullname" . }}
  labels:
    {{- include "enterprise-devsecops-api.labels" . | nindent 4 }}

spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      {{- include "enterprise-devsecops-api.selectorLabels" . | nindent 6 }}

  template:
    metadata:
      labels:
        {{- include "enterprise-devsecops-api.selectorLabels" . | nindent 8 }}

    spec:
      serviceAccountName: {{ include "enterprise-devsecops-api.serviceAccountName" . }}

      containers:
        - name: {{ .Chart.Name }}

          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP

          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.httpGet.path }}
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.httpGet.path }}
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5

          resources:
{{ toYaml .Values.resources | indent 12 }}